<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Dashboard</title>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial;
    background: black;
    color: white;
}

/* CAMERA (75%) */
#cameraContainer {
    width: 75%;
    height: 100%;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* SIDE PANEL (25%) */
#panel {
    width: 25%;
    background: linear-gradient(180deg, #0f2027, #203a43);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
}

/* AI Circle */
.circle {
    width: 120px;
    height: 120px;
    border: 3px solid cyan;
    border-radius: 50%;
    margin: auto;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* Status */
#status {
    text-align: center;
    margin-top: 10px;
    color: cyan;
}

/* Conversation */
#conversation {
    flex-grow: 1;
    overflow-y: auto;
    margin-top: 20px;
    font-size: 14px;
}

.msg {
    margin: 10px 0;
}

.user { color: #00ffcc; }
.ai { color: #ffffff; }

/* Wave animation */
.wave {
    height: 5px;
    background: cyan;
    animation: wave 1s infinite;
}

@keyframes wave {
    0% { width: 10%; }
    50% { width: 80%; }
    100% { width: 10%; }
}
</style>
</head>

<body>

<!-- CAMERA -->
<div id="cameraContainer">
    <video id="camera" autoplay muted></video>
</div>

<!-- AI PANEL -->
<div id="panel">

    <div>
        <div class="circle"></div>
        <div id="status">Initializing...</div>
    </div>

    <div id="conversation"></div>

    <div class="wave"></div>

</div>

<script>
// ---------------- SPEECH ----------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "en-US";

// Local responses
const responses = {

    // Greetings
    "hello": "Hello, I am online.",
    "hi": "Hi there!",
    "hey": "Hey! What can I do for you?",

    // Basic questions
    "how are you": "All systems are running perfectly.",
    "your name": "I am your AI dashboard assistant.",
    "who made you": "You created me. Pretty cool, right?",

    // Time & Date
    "time": () => "Current time is " + new Date().toLocaleTimeString(),
    "date": () => "Today is " + new Date().toDateString(),

    // System style responses
    "status": "All systems operational.",
    "are you listening": "Yes, I am always listening.",

    // Actions
    "open youtube": "Opening YouTube",
    "open google": "Opening Google",
    "open github": "Opening GitHub",
    "search": "What should I search for?",

    // Fun / personality
    "tell me a joke": "Why do programmers hate nature? Too many bugs.",
    "do you sleep": "I never sleep. I am always awake.",
    "thank you": "You're welcome.",
    "bye": "Goodbye. Shutting down interaction mode.",

    // Smart fallback hints
    "help": "You can ask me about time, open websites, or just chat with me."
};

// Start loop
function startListening() {
    document.getElementById("status").innerText = "Listening...";
    recognition.start();
}

recognition.onresult = function(event) {
    let text = event.results[0][0].transcript.toLowerCase();
    addMessage("You: " + text, "user");
    handleCommand(text);
};

recognition.onend = () => setTimeout(startListening, 500);

// ---------------- COMMAND ----------------
function handleCommand(command) {
    let response = "I don't understand.";

    for (let key in responses) {
        if (command.includes(key)) {
            response = typeof responses[key] === "function"
                ? responses[key]()
                : responses[key];

            if (key === "open youtube") window.open("https://youtube.com");
            if (key === "open google") window.open("https://google.com");
            break;
        }
    }

    addMessage("AI: " + response, "ai");
    speak(response);
}

// ---------------- UI ----------------
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    let convo = document.getElementById("conversation");
    convo.appendChild(div);
    convo.scrollTop = convo.scrollHeight;
}

// ---------------- SPEAK ----------------
function speak(text) {
    document.getElementById("status").innerText = "Speaking...";
    let speech = new SpeechSynthesisUtterance(text);
    speech.onend = () => {
        document.getElementById("status").innerText = "Waiting...";
    };
    window.speechSynthesis.speak(speech);
}

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    document.getElementById("camera").srcObject = stream;
})
.catch(err => console.log(err));

// ---------------- START ----------------
setTimeout(startListening, 1000);
</script>

</body>
</html>
