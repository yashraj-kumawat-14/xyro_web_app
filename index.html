<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Dashboard</title>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial;
    background: black;
    color: white;
}

/* CAMERA (75%) */
#cameraContainer {
    width: 75%;
    height: 100%;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* SIDE PANEL (25%) */
#panel {
    width: 25%;
    background: linear-gradient(180deg, #0f2027, #203a43);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
}

/* AI Circle */
.circle {
    width: 120px;
    height: 120px;
    border: 3px solid cyan;
    border-radius: 50%;
    margin: auto;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* Status */
#status {
    text-align: center;
    margin-top: 10px;
    color: cyan;
}

/* Conversation */
#conversation {
    flex-grow: 1;
    overflow-y: auto;
    margin-top: 20px;
    font-size: 14px;
}

.msg {
    margin: 10px 0;
}

.user { color: #00ffcc; }
.ai { color: #ffffff; }

/* Wave animation */
.wave {
    height: 5px;
    background: cyan;
    animation: wave 1s infinite;
}

@keyframes wave {
    0% { width: 10%; }
    50% { width: 80%; }
    100% { width: 10%; }
}
</style>
</head>

<body>

<!-- CAMERA -->
<div id="cameraContainer">
    <video id="camera" autoplay muted></video>
</div>

<!-- AI PANEL -->
<div id="panel">

    <div>
        <div class="circle"></div>
        <div id="status">Initializing...</div>
    </div>

    <div id="conversation"></div>

    <div class="wave"></div>

</div>

<script>
// ---------------- DEBUG LOGGER ----------------
function log(msg) {
    console.log("[DEBUG]", msg);

    let convo = document.getElementById("conversation");
    let div = document.createElement("div");
    div.className = "msg";
    div.style.color = "#ffaa00";
    div.innerText = "[LOG] " + msg;
    convo.appendChild(div);
    convo.scrollTop = convo.scrollHeight;
}

// ---------------- SPEECH SETUP ----------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;

log("Checking SpeechRecognition support...");

if (!SpeechRecognition) {
    log("â SpeechRecognition NOT supported");

    document.getElementById("status").innerText =
        "Speech NOT supported";

} else {
    log("â SpeechRecognition supported");

    recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    function startListening() {
        log("ð¤ Starting listening...");
        document.getElementById("status").innerText = "Listening...";

        try {
            recognition.start();
        } catch (e) {
            log("Error starting recognition: " + e);
        }
    }

    recognition.onstart = () => log("ð¤ Mic started");
    recognition.onaudiostart = () => log("ð Audio capture started");
    recognition.onspeechstart = () => log("ð£ï¸ Speech detected");

    recognition.onresult = function(event) {
        log("â Got speech result");

        let text = event.results[0][0].transcript.toLowerCase();
        log("User said: " + text);

        addMessage("You: " + text, "user");
        handleCommand(text);
    };

    recognition.onerror = function(event) {
        log("â Speech error: " + event.error);
    };

    recognition.onend = () => {
        log("ð Restarting listening...");
        setTimeout(startListening, 1000);
    };

    setTimeout(startListening, 1500);
}

// ---------------- RESPONSES ----------------
const responses = {
    "hello": "Hello, I am online.",
    "time": () => new Date().toLocaleTimeString(),
    "open google": "Opening Google"
};

// ---------------- COMMAND ----------------
function handleCommand(command) {
    log("Processing command: " + command);

    let response = "I don't understand.";

    for (let key in responses) {
        if (command.includes(key)) {
            log("Matched command: " + key);

            response = typeof responses[key] === "function"
                ? responses[key]()
                : responses[key];

            if (key === "open google") window.open("https://google.com");

            break;
        }
    }

    addMessage("AI: " + response, "ai");
    speak(response);
}

// ---------------- UI ----------------
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    let convo = document.getElementById("conversation");
    convo.appendChild(div);
    convo.scrollTop = convo.scrollHeight;
}

// ---------------- SPEAK ----------------
function speak(text) {
    log("Speaking: " + text);

    document.getElementById("status").innerText = "Speaking...";

    let speech = new SpeechSynthesisUtterance(text);

    speech.onend = () => {
        log("Finished speaking");
        document.getElementById("status").innerText = "Waiting...";
    };

    window.speechSynthesis.speak(speech);
}

// ---------------- CAMERA ----------------
log("Initializing camera...");

navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
    log("â Camera started");

    const video = document.getElementById("camera");
    video.srcObject = stream;
    video.play();
})
.catch(err => {
    log("â Camera error: " + err);
    document.getElementById("status").innerText = "Camera error";
});
</script>

</body>
</html>
