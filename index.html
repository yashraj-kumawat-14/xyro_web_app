<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Dashboard</title>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial;
    background: black;
    color: white;
}

/* CAMERA (75%) */
#cameraContainer {
    width: 75%;
    height: 100%;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* SIDE PANEL (25%) */
#panel {
    width: 25%;
    background: linear-gradient(180deg, #0f2027, #203a43);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
}

/* AI Circle */
.circle {
    width: 120px;
    height: 120px;
    border: 3px solid cyan;
    border-radius: 50%;
    margin: auto;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* Status */
#status {
    text-align: center;
    margin-top: 10px;
    color: cyan;
}

/* Conversation */
#conversation {
    flex-grow: 1;
    overflow-y: auto;
    margin-top: 20px;
    font-size: 14px;
}

.msg {
    margin: 10px 0;
}

.user { color: #00ffcc; }
.ai { color: #ffffff; }

/* Wave animation */
.wave {
    height: 5px;
    background: cyan;
    animation: wave 1s infinite;
}

@keyframes wave {
    0% { width: 10%; }
    50% { width: 80%; }
    100% { width: 10%; }
}
</style>
</head>

<body>

<!-- CAMERA -->
<div id="cameraContainer">
    <video id="camera" autoplay muted></video>
</div>

<!-- AI PANEL -->
<div id="panel">

    <div>
        <div class="circle"></div>
        <div id="status">Initializing...</div>
    </div>

    <div id="conversation"></div>

    <div class="wave"></div>

</div>

<script>
// ---------------- SPEECH (FIXED FOR RPI) ----------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;

// Local responses
const responses = {

    "hello": "Hello, I am online.",
    "hi": "Hi there!",
    "hey": "Hey! What can I do for you?",

    "how are you": "All systems are running perfectly.",
    "your name": "I am your AI dashboard assistant.",
    "who made you": "You created me. Pretty cool, right?",

    "time": () => "Current time is " + new Date().toLocaleTimeString(),
    "date": () => "Today is " + new Date().toDateString(),

    "status": "All systems operational.",
    "are you listening": "Yes, I am always listening.",

    "open youtube": "Opening YouTube",
    "open google": "Opening Google",
    "open github": "Opening GitHub",
    "search": "What should I search for?",

    "tell me a joke": "Why do programmers hate nature? Too many bugs.",
    "do you sleep": "I never sleep. I am always awake.",
    "thank you": "You're welcome.",
    "bye": "Goodbye. Shutting down interaction mode.",
    "help": "You can ask me about time, open websites, or just chat with me."
};

// ---------------- INIT SPEECH ----------------
if (!SpeechRecognition) {
    document.getElementById("status").innerText =
        "Speech NOT supported (RPi Chromium)";

    // 🔹 Keyboard fallback
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            let cmd = prompt("Enter command:");
            if (cmd) {
                addMessage("You: " + cmd, "user");
                handleCommand(cmd.toLowerCase());
            }
        }
    });

    // 🔹 Auto demo (so UI doesn't look dead)
    setInterval(() => {
        let demo = "hello";
        addMessage("You: " + demo, "user");
        handleCommand(demo);
    }, 8000);

} else {
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    function startListening() {
        document.getElementById("status").innerText = "Listening...";
        recognition.start();
    }

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript.toLowerCase();
        addMessage("You: " + text, "user");
        handleCommand(text);
    };

    recognition.onend = () => setTimeout(startListening, 500);

    setTimeout(startListening, 1000);
}

// ---------------- COMMAND ----------------
function handleCommand(command) {
    let response = "I don't understand.";

    for (let key in responses) {
        if (command.includes(key)) {

            response = typeof responses[key] === "function"
                ? responses[key]()
                : responses[key];

            if (key === "open youtube") window.open("https://youtube.com");
            if (key === "open google") window.open("https://google.com");
            if (key === "open github") window.open("https://github.com");

            if (key === "search") {
                let query = command.replace("search", "").trim();
                if (query) {
                    window.open(`https://www.google.com/search?q=${query}`);
                    response = "Searching for " + query;
                }
            }

            break;
        }
    }

    addMessage("AI: " + response, "ai");
    speak(response);
}

// ---------------- UI ----------------
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    let convo = document.getElementById("conversation");
    convo.appendChild(div);
    convo.scrollTop = convo.scrollHeight;
}

// ---------------- SPEAK ----------------
function speak(text) {
    document.getElementById("status").innerText = "Speaking...";
    let speech = new SpeechSynthesisUtterance(text);

    speech.onend = () => {
        document.getElementById("status").innerText = "Waiting...";
    };

    window.speechSynthesis.speak(speech);
}

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
    const video = document.getElementById("camera");
    video.srcObject = stream;
    video.play();
})
.catch(err => {
    console.log("Camera error:", err);
    document.getElementById("status").innerText = "Camera/Mic error";
});
</script>
</body>
</html>
