<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Voice Assistant</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; }
        #status { margin-bottom: 20px; color: #aaa; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 50px; border: none; background: #3d5afe; color: white; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .listening { background: #f44336 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(244, 67, 54, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); } }
    </style>
</head>
<body>

    <div id="status">Click to Start Talking</div>
    <button id="micBtn">🎤 Start Conversation</button>
    <p id="transcript" style="margin-top: 20px; font-style: italic;"></p>

    <script>
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');
        const transcriptDisplay = document.getElementById('transcript');

        // 1. Setup Speech Recognition (STT)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-US';

        // 2. Setup Speech Synthesis (TTS)
        const synth = window.speechSynthesis;

        micBtn.onclick = () => {
            recognition.start();
            status.innerText = "Listening...";
            micBtn.classList.add('listening');
        };

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            transcriptDisplay.innerText = `You: ${userText}`;
            micBtn.classList.remove('listening');
            status.innerText = "Thinking...";

            // 3. Send to AI (Replace with your actual API endpoint)
            const aiResponse = await getAIResponse(userText);
            
            speak(aiResponse);
        };

        async function getAIResponse(text) {
            // Placeholder: Connect this to your Gemini or OpenAI API key
            // For now, it just echoes back
            return "You said " + text + ". I am your AI assistant.";
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            status.innerText = "Speaking...";
            synth.speak(utterance);
            utterance.onend = () => { status.innerText = "Ready"; };
        }
    </script>
</body>
</html>
